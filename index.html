<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>🧩 Сканворд</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <div class="container">
        <h1>🧩 Сканворд</h1>
        <p class="subtitle">Введи буквы в клетки. Стрелки показывают направление</p>

        <div id="crossword-grid"></div>

        <div class="buttons">
            <button id="checkBtn">✅ Проверить</button>
            <button id="resetBtn">🔄 Очистить</button>
            <button id="hintBtn">💡 Подсказка</button>
        </div>

        <div id="message"></div>
        <div id="score">🎯 Отгадано: <span id="correctCount">0</span> из <span id="totalCount">0</span></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
